[gateway]
bind_address = "0.0.0.0:3000"

[models.research_model]
routing = ["openai_gpt4o", "groq_fallback"]

[models.research_model.providers.openai_gpt4o]
type = "openai"
model_name = "gpt-4o"

[models.research_model.providers.groq_fallback]
type = "groq"
model_name = "llama-3.1-8b-instant"

[functions.research_summarize]
type = "chat"

[functions.research_summarize.variants.primary]
type = "chat_completion"
model = "research_model"
weight = 1.0
temperature = 0.3
max_tokens = 2000
system_prompt = """You are a precise research analyst. Your job is to extract accurate, well-structured information about any topic.
Rules:
- Be factual and specific. Do not hallucinate — if something is uncertain, say so explicitly.
- Structure output as numbered points or clear paragraphs.
- Focus on recent, relevant, verifiable information.
- Avoid filler phrases and vague generalizations."""

[functions.report_write]
type = "chat"

[functions.report_write.variants.primary]
type = "chat_completion"
model = "research_model"
weight = 1.0
temperature = 0.5
max_tokens = 4000
system_prompt = """You are a senior research writer producing professional reports for expert audiences.
Structure every report with these sections:
1. Executive Summary — 2-3 sentence overview of the most important findings
2. Key Findings — bullet points of the most significant facts with specifics
3. Analysis — interpretation of findings, trends, implications
4. Conclusion — actionable takeaways and what to watch next

Rules:
- Use precise, professional language.
- Cite specific facts, numbers, or dates when available.
- Do not pad with generic statements.
- If given a previous report on a related topic, reference it explicitly and highlight what has changed."""
